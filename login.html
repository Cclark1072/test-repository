	loginForm.addEventListener('submit', async (e) => {
    	e.preventDefault(); // This stops the page from refreshing/looking for a PHP file

    	// 4. Equivalent of $_POST: Get values from the input fields
    	const email = document.getElementById('email').value;
    	const password = document.getElementById('password').value;

    	// 5. The Login Logic (Replaces your MySQL query and password verification)
    	const { data, error } = await _supabase.auth.signInWithPassword({
        	email: email,
        	password: password,
    	});

    	if (error) {
        	// If password is wrong or user doesn't exist
        	alert("Login failed: " + error.message);
    	} else {
        	// SUCCESS! 
        	console.log("User logged in:", data.user);
        	window.location.href = "dashboard.html"; // Redirect the user
    	}
	});
